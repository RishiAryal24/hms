databases:
  - name: hms-db
    plan: free
    databaseName: hms_db
    user: hms

services:
  - type: web
    name: hms-api
    runtime: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "gunicorn hms.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hms-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://hms-frontend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://hms-frontend.onrender.com"
      - key: CORS_ALLOWED_ORIGIN_REGEXES
        value: "https://.*\\.onrender\\.com"

  - type: web
    name: hms-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://hms-api.onrender.com/api"
